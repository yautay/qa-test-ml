[pytest]
testpaths = tests
cache_dir = /tmp/ai_corner_pytest_cache
markers =
    redis_integration: tests requiring a live auth-enabled Redis instance
filterwarnings =
    ignore:The parameter 'pretrained' is deprecated since 0.13:UserWarning
    ignore:Arguments other than a weight enum or `None` for 'weights' are deprecated since 0.13:UserWarning
