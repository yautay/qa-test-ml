version: "3.9"

services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: pms-prometheus
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.3.0
    container_name: pms-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  redis-exporter:
    image: oliver006/redis_exporter:v1.63.0
    container_name: pms-redis-exporter
    ports:
      - "9121:9121"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      REDIS_ADDR: ${REDIS_EXPORTER_ADDR:-redis://redis.example.com:6379}
      # External Redis examples:
      # REDIS_ADDR: rediss://redis.example.com:6380
      # REDIS_USER: svc-user
      # REDIS_PASSWORD: svc-password
      # REDIS_EXPORTER_SKIP_TLS_VERIFICATION: "false"
