global:
  scrape_interval: 5s

scrape_configs:
  - job_name: pms-api
    static_configs:
      - targets: ["host.docker.internal:8080"]

  - job_name: redis-exporter
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: pms-worker-cpu
    static_configs:
      - targets: ["host.docker.internal:9101"]

  - job_name: pms-worker-gpu
    static_configs:
      - targets: ["host.docker.internal:9102"]
