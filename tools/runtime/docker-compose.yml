# Perceptual Metrics Service - Docker Compose
#
# Usage:
#   - CPU workers:     docker compose --profile cpu up --build
#   - GPU workers:     docker compose --profile gpu up --build
#   - Both workers:    docker compose --profile cpu --profile gpu up --build
#
# Requirements:
#   - Python 3.12
#   - nvidia-container-toolkit for GPU support
#
# Note: PyTorch 2.10+ auto-detects CPU/GPU at runtime

services:
  redis:
    image: redis:7.2-alpine
    container_name: pms-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    mem_limit: 512m
    # Local default Redis for development. For an external service, keep this
    # service unused and point REDIS_URL or REDIS_* variables in tools/runtime/.env.

  api:
    image: python:3.12-slim
    container_name: pms-api
    working_dir: /workspace
    volumes:
      - ../../:/workspace
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
      - API_WORKERS=1
    command: >
      sh -c "apt-get update && apt-get install -y git &&
      git config --global --add safe.directory /workspace &&
      pip install --no-cache-dir -r requirements.txt &&
      uvicorn app.main:app --host 0.0.0.0 --port 8080 --workers \${API_WORKERS:-1}"
    depends_on:
      - redis
    mem_limit: 64g
    cpus: 8

  worker-cpu:
    image: python:3.12-slim
    container_name: pms-worker-cpu
    working_dir: /workspace
    volumes:
      - ../../:/workspace
    env_file:
      - .env
    environment:
      - CELERY_CPU_CONCURRENCY=1
      - PROMETHEUS_WORKER_ENABLED=true
      - PROMETHEUS_WORKER_PORT=9101
      - PROMETHEUS_MULTIPROC_DIR=/tmp/pms-prom-cpu
    ports:
      - "9101:9101"
    command: >
      sh -c "apt-get update && apt-get install -y git curl &&
      git config --global --add safe.directory /workspace &&
      mkdir -p /root/.cache/torch/hub/checkpoints &&
      curl -o /root/.cache/torch/hub/checkpoints/vgg16-397923af.pth https://download.pytorch.org/models/vgg16-397923af.pth &&
      curl -o /root/.cache/torch/hub/checkpoints/alexnet-owt-7be5be79.pth https://download.pytorch.org/models/alexnet-owt-7be5be79.pth &&
      pip install --no-cache-dir -r requirements.txt &&
      celery -A app.core.celery_app:celery_app worker -Q ${COMPARE_QUEUE_CPU:-compare-cpu} --concurrency=${CELERY_CPU_CONCURRENCY:-1} --loglevel=${CELERY_LOG_LEVEL:-INFO}"
    depends_on:
      - redis
    mem_limit: 64g
    cpus: 8
    profiles:
      - cpu

  worker-gpu:
    image: nvidia/cuda:12.4.1-runtime-ubuntu22.04
    container_name: pms-worker-gpu
    working_dir: /workspace
    volumes:
      - ../../:/workspace
    env_file:
      - .env
    environment:
      - CELERY_GPU_CONCURRENCY=1
      - PROMETHEUS_WORKER_ENABLED=true
      - PROMETHEUS_WORKER_PORT=9102
      - PROMETHEUS_MULTIPROC_DIR=/tmp/pms-prom-gpu
    ports:
      - "9102:9102"
    command: >
      sh -c "apt-get update && apt-get install -y git curl python3 python3-pip python3-venv wget &&
      git config --global --add safe.directory /workspace &&
      mkdir -p /root/.cache/torch/hub/checkpoints &&
      curl -o /root/.cache/torch/hub/checkpoints/vgg16-397923af.pth https://download.pytorch.org/models/vgg16-397923af.pth &&
      curl -o /root/.cache/torch/hub/checkpoints/alexnet-owt-7be5be79.pth https://download.pytorch.org/models/alexnet-owt-7be5be79.pth &&
      python3 -m pip install --no-cache-dir -r requirements.txt &&
      python3 -m celery -A app.core.celery_app:celery_app worker -Q ${COMPARE_QUEUE_GPU:-compare-gpu} --concurrency=${CELERY_GPU_CONCURRENCY:-1} --loglevel=${CELERY_LOG_LEVEL:-INFO}"
    depends_on:
      - redis
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles:
      - gpu

volumes:
  redis-data:

# External Redis note:
# - Set REDIS_URL=rediss://user:password@host:port/db or clear REDIS_URL and use
#   REDIS_HOST/REDIS_PORT/REDIS_DB/REDIS_USERNAME/REDIS_PASSWORD/REDIS_TLS.
# - Leave CELERY_BROKER_URL and CELERY_RESULT_BACKEND empty to share the same Redis.
