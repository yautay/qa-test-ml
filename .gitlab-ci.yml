---
# GitLab CI/CD pipeline for Perceptual Metrics Service
# Docs: https://docs.gitlab.com/ee/ci/

default:
  image: python:3.12-slim
  before_script:
    - pip install --upgrade pip
    - pip install -r requirements-dev.txt
  cache:
    key:
      files:
        - requirements-dev.txt
        - requirements.txt
    paths:
      - .cache/pip
    policy: pull-push

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  CELERY_TASK_ALWAYS_EAGER: "true"
  JOB_STORE_BACKEND: "memory"

stages:
  - test
  - lint
  - security

# ── Test ──────────────────────────────────────────────────────────────────────

pytest:
  stage: test
  script:
    - pytest -q
        --cov=app
        --cov-report=term-missing
        --cov-report=xml:coverage.xml
        --junitxml=pytest-results.xml
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    when: always
    reports:
      junit: pytest-results.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
      - pytest-results.xml
    expire_in: 7 days

# ── Lint ─────────────────────────────────────────────────────────────────────

ruff:
  stage: lint
  script:
    - ruff check .
  needs: []

black:
  stage: lint
  script:
    - black --check .
  needs: []

mypy:
  stage: lint
  script:
    - mypy .
  needs: []

# ── Security ──────────────────────────────────────────────────────────────────

pip-audit:
  stage: security
  script:
    - pip-audit
  needs: []

bandit:
  stage: security
  script:
    - bandit -r app/ -ll -f json -o bandit-report.json || true
    - bandit -r app/ -ll
  artifacts:
    when: always
    paths:
      - bandit-report.json
    expire_in: 7 days
  needs: []
